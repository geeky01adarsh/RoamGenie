services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    container_name: roamgenie-server
    ports:
      - "9001:9001"
    env_file:
      - ./server/.env
    environment:
      - PORT=9001
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:9173
      - LOG_LEVEL=info
    volumes:
      - ./server/src:/app/server/src
      - ./shared:/app/shared
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9001/api/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  client:
    build:
      context: .
      dockerfile: Dockerfile
      target: client

    container_name: roamgenie-client
    ports:
      - "9173:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
